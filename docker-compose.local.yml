services:
  web:
    build: .
    command: sh -c "npx prisma migrate deploy && npm run start"
    restart: unless-stopped
    env_file: .env
    environment:
      # This overrides the .env file ONLY inside this container
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/dy_inventory?schema=public
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch(\'http://localhost:3000/api/health\').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: sh -c "npx prisma migrate deploy && npm run worker"
    restart: unless-stopped
    env_file: .env
    environment:
      # This overrides the .env file ONLY inside this container
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/dy_inventory?schema=public
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432" # Maps host port 5432 to container port 5432
    environment:
      POSTGRES_DB: dy_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dy_inventory"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
